<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="./image/instagram.png" />
  </head>
  <body>
    <div class="container">
      <div class="left-side">
        <img
          src="./image/instagram.jpg"
          width="450px"
          alt="Instagram Preview"
        />
      </div>
      <div class="right-side">
        <div class="login-box">
          <h1>Instagram</h1>
          <form id="loginForm">
            <input
              type="text"
              id="username"
              placeholder="Phone number, username, or email"
              required
            />
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <button type="submit">Log In</button>
          </form>
          <div class="separator">
            <div class="line"></div>
            <span>OR</span>
            <div class="line"></div>
          </div>
          <button class="facebook-btn">Log in with Facebook</button>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="signup-box">
          Don't have an account? <a href="#">Sign up</a>
        </div>
        <p>Get the app.</p>
        <div class="ntwork">
          <a href="https://play.google.com/store/games?hl=ru&pli=1">
            <img src="./image/googleplay.png " width="130px" alt="" />
          </a>
          <a href="https://www.microsoft.com/ru-ru">
            <img src="./image/microsoft.png" width="130px" alt="" />
          </a>
        </div>
      </div>
    </div>

    <script src="app.js"></script> <!-- JavaScript faylini qo'shish -->
  </body>
</html>
